<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boutique Store</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,500&amp;family=Work+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
<!-- Firebase (compat build - works with plain <script> tags, no bundler needed) -->
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<style>
  :root{
    --ivory:#FBF7F1;
    --ivory-deep:#F3ECE1;
    --ink:#2B2620;
    --ink-soft:#6B6154;
    --green:#3F5A46;
    --green-deep:#2C4133;
    --rose:#C98B7A;
    --brass:#A9822C;
    --line:#E4DACB;
    --white:#FFFFFF;
    --wa:#25D366;
    --wa-deep:#1DA851;
    --radius:2px;
    --shadow:0 1px 2px rgba(43,38,32,0.06), 0 8px 24px rgba(43,38,32,0.06);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Work Sans', sans-serif;
    background:var(--ivory);
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
  }
  h1,h2,h3,.display{
    font-family:'Fraunces', serif;
    font-weight:500;
    color:var(--ink);
    margin:0;
  }
  a{color:inherit;text-decoration:none;}
  button{font-family:inherit;cursor:pointer;}
  ::selection{background:var(--rose);color:var(--white);}

  /* ---------- App shell ---------- */
  .app{min-height:100vh;display:flex;flex-direction:column;}

  /* ---------- Header ---------- */
  .site-header{
    background:var(--ivory);
    border-bottom:1px solid var(--line);
    padding:22px 28px 18px;
    position:sticky;top:0;z-index:20;
    backdrop-filter:blur(6px);
  }
  .header-row{
    display:flex;align-items:flex-start;justify-content:space-between;
    max-width:1180px;margin:0 auto;gap:16px;
  }
  .brand-block{display:flex;flex-direction:column;gap:2px;}
  .brand-logo{height:56px;width:auto;display:block;}
  .shop-name{font-size:28px;letter-spacing:0.2px;}
  .shop-tagline{font-size:13px;color:var(--ink-soft);letter-spacing:0.3px;}
  .header-actions{display:flex;align-items:center;gap:10px;flex-shrink:0;}
  .icon-btn{
    border:1px solid var(--line);background:var(--white);
    padding:9px 14px;border-radius:var(--radius);
    font-size:12.5px;color:var(--ink-soft);letter-spacing:0.3px;
    display:flex;align-items:center;gap:6px;
    transition:border-color .15s, color .15s;
  }
  .icon-btn:hover{border-color:var(--green);color:var(--green-deep);}

  /* ---------- Controls bar ---------- */
  .controls{
    max-width:1180px;margin:18px auto 0;padding:0 28px;
    display:flex;flex-wrap:wrap;gap:12px;align-items:center;
  }
  .search-wrap{
    flex:1 1 260px;position:relative;
  }
  .search-wrap input{
    width:100%;padding:11px 14px 11px 36px;
    border:1px solid var(--line);border-radius:var(--radius);
    background:var(--white);font-size:14px;color:var(--ink);
    font-family:inherit;
  }
  .search-wrap input:focus{outline:2px solid var(--green);outline-offset:1px;}
  .search-wrap svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);opacity:0.45;}
  .price-filter{display:flex;align-items:center;gap:6px;}
  .price-filter input{
    width:80px;padding:10px 10px;border:1px solid var(--line);
    border-radius:var(--radius);font-size:13px;font-family:inherit;background:var(--white);
  }
  .price-filter input:focus{outline:2px solid var(--green);outline-offset:1px;}
  .price-filter span{color:var(--ink-soft);font-size:13px;}
  select.sort-select{
    padding:10px 12px;border:1px solid var(--line);border-radius:var(--radius);
    background:var(--white);font-size:13px;font-family:inherit;color:var(--ink);
  }

  .chip-row{
    max-width:1180px;margin:14px auto 0;padding:0 28px 6px;
    display:flex;gap:8px;flex-wrap:wrap;
  }
  .chip{
    padding:7px 15px;border:1px solid var(--line);border-radius:20px;
    font-size:12.5px;letter-spacing:0.3px;background:var(--white);color:var(--ink-soft);
    transition:all .15s;
  }
  .chip.active{background:var(--green);border-color:var(--green);color:var(--white);}
  .chip:hover:not(.active){border-color:var(--green);color:var(--green-deep);}

  /* ---------- Grid ---------- */
  .grid-wrap{max-width:1180px;margin:26px auto 60px;padding:0 28px;flex:1;width:100%;}
  .count-row{font-size:12.5px;color:var(--ink-soft);margin-bottom:16px;letter-spacing:0.2px;}
  .grid{
    display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));
    gap:22px;
  }
  .card{
    background:var(--white);border:1px solid var(--line);border-radius:var(--radius);
    overflow:hidden;display:flex;flex-direction:column;
    transition:box-shadow .2s, transform .2s;
    position:relative;
  }
  .card:hover{box-shadow:var(--shadow);transform:translateY(-2px);}
  .card-img{
    aspect-ratio:1/1.08;background:var(--ivory-deep);
    display:flex;align-items:center;justify-content:center;overflow:hidden;
    position:relative;
  }
  .card-img img{width:100%;height:100%;object-fit:cover;}
  .no-img{color:var(--ink-soft);font-size:12px;letter-spacing:0.3px;font-family:'Fraunces',serif;font-style:italic;}
  .card-body{padding:14px 15px 16px;display:flex;flex-direction:column;gap:6px;flex:1;}
  .card-cat{font-size:10.5px;letter-spacing:0.8px;text-transform:uppercase;color:var(--rose);font-weight:600;}
  .card-name{font-family:'Fraunces',serif;font-size:16.5px;font-weight:500;line-height:1.3;color:var(--ink);}
  .card-price{
    font-family:'Fraunces',serif;font-size:17px;color:var(--brass);margin-top:2px;
    display:flex;align-items:center;gap:6px;
  }
  .tag-icon{width:12px;height:12px;flex-shrink:0;opacity:0.8;}
  .card-desc{font-size:12.5px;color:var(--ink-soft);line-height:1.5;flex:1;}
  .wa-btn{
    margin-top:10px;display:flex;align-items:center;justify-content:center;gap:8px;
    background:var(--wa);color:var(--white);padding:10px 12px;border-radius:var(--radius);
    font-size:13px;font-weight:600;letter-spacing:0.2px;border:none;
    transition:background .15s;
  }
  .wa-btn:hover{background:var(--wa-deep);}
  .save-photo-btn{
    text-align:center;margin-top:8px;font-size:11px;
    color:var(--ink-soft);letter-spacing:0.1px;line-height:1.4;
  }
  .share-btn{
    margin-top:8px;width:100%;text-align:center;
    background:transparent;border:1px solid var(--line);color:var(--ink-soft);
    padding:9px 10px;border-radius:var(--radius);font-size:12px;letter-spacing:0.1px;
    transition:border-color .15s, color .15s;
  }
  .share-btn:hover{border-color:var(--green);color:var(--green-deep);}

  .empty-state{
    text-align:center;padding:80px 20px;color:var(--ink-soft);
  }
  .empty-state .display{font-size:22px;color:var(--ink);margin-bottom:8px;}

  /* ---------- Floating WhatsApp ---------- */
  .float-wa{
    position:fixed;bottom:22px;right:22px;z-index:30;
    background:var(--wa);color:#fff;width:56px;height:56px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;box-shadow:0 6px 18px rgba(0,0,0,0.2);
    transition:transform .15s;
  }
  .float-wa:hover{transform:scale(1.06);}

  /* ---------- Footer ---------- */
  .site-footer{
    border-top:1px solid var(--line);padding:22px 28px;text-align:center;
    font-size:12px;color:var(--ink-soft);letter-spacing:0.3px;
  }

  /* ---------- Overlay / Modal shared ---------- */
  .overlay{
    position:fixed;inset:0;background:rgba(43,38,32,0.45);
    display:flex;align-items:center;justify-content:center;z-index:100;
    padding:20px;
  }
  .modal{
    background:var(--ivory);border-radius:var(--radius);max-width:480px;width:100%;
    max-height:88vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.25);
  }
  .modal-wide{max-width:640px;}
  .lightbox-modal{max-width:760px;}
  .lightbox-body{padding:0;display:flex;flex-wrap:wrap;gap:0;}
  .lightbox-img{flex:1 1 320px;background:var(--ivory-deep);display:flex;align-items:center;justify-content:center;min-height:320px;max-height:70vh;overflow:hidden;}
  .lightbox-img img{width:100%;height:100%;object-fit:contain;max-height:70vh;}
  .lightbox-info{flex:1 1 260px;padding:22px 24px;display:flex;flex-direction:column;gap:10px;}
  .lightbox-price{font-family:'Fraunces',serif;font-size:22px;color:var(--brass);display:flex;align-items:center;gap:8px;}
  .lightbox-desc{font-size:14px;color:var(--ink-soft);line-height:1.6;}
  .card-img{cursor:pointer;}
  .card-name{cursor:pointer;}
  @media (max-width:600px){ .lightbox-img{min-height:220px;} }
  .modal-head{
    padding:20px 24px;border-bottom:1px solid var(--line);
    display:flex;align-items:center;justify-content:space-between;
  }
  .modal-head h2{font-size:19px;}
  .modal-close{font-size:20px;color:var(--ink-soft);padding:4px;line-height:1;}
  .modal-close:hover{color:var(--ink);}
  .modal-body{padding:22px 24px 26px;}
  .field{margin-bottom:16px;}
  .field label{display:block;font-size:12px;letter-spacing:0.3px;color:var(--ink-soft);margin-bottom:6px;text-transform:uppercase;}
  .field input,.field select,.field textarea{
    width:100%;padding:11px 13px;border:1px solid var(--line);border-radius:var(--radius);
    font-family:inherit;font-size:14px;background:var(--white);color:var(--ink);
  }
  .field input:focus,.field select:focus,.field textarea:focus{outline:2px solid var(--green);outline-offset:1px;}
  .field textarea{resize:vertical;min-height:70px;}
  .field-row{display:flex;gap:12px;}
  .field-row .field{flex:1;}
  .hint{font-size:11.5px;color:var(--ink-soft);margin-top:5px;}
  .btn{
    padding:11px 20px;border-radius:var(--radius);font-size:13.5px;font-weight:600;
    letter-spacing:0.2px;border:1px solid transparent;
  }
  .btn-primary{background:var(--green);color:var(--white);}
  .btn-primary:hover{background:var(--green-deep);}
  .btn-ghost{background:transparent;border-color:var(--line);color:var(--ink-soft);}
  .btn-ghost:hover{border-color:var(--ink-soft);color:var(--ink);}
  .btn-danger{background:transparent;border-color:#C4483A;color:#C4483A;}
  .btn-danger:hover{background:#C4483A;color:#fff;}
  .btn-row{display:flex;gap:10px;justify-content:flex-end;margin-top:20px;}
  .error-msg{color:#C4483A;font-size:12.5px;margin-top:8px;}

  .img-upload{
    border:1.5px dashed var(--line);border-radius:var(--radius);padding:16px;
    text-align:center;cursor:pointer;background:var(--white);position:relative;
  }
  .img-upload:hover{border-color:var(--green);}
  .img-upload img{max-width:100%;max-height:160px;border-radius:var(--radius);margin-bottom:8px;}
  .img-upload input{display:none;}
  .img-upload .up-label{font-size:12.5px;color:var(--ink-soft);}

  /* ---------- Admin ---------- */
  .admin-shell{max-width:1000px;margin:0 auto;padding:30px 24px 70px;}
  .admin-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px;}
  .tabs{display:flex;gap:6px;border-bottom:1px solid var(--line);margin-bottom:24px;}
  .tab{padding:11px 18px;font-size:13.5px;color:var(--ink-soft);border-bottom:2px solid transparent;letter-spacing:0.2px;}
  .tab.active{color:var(--green-deep);border-color:var(--green);font-weight:600;}
  .admin-table{width:100%;border-collapse:collapse;background:var(--white);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;}
  .admin-table th{
    text-align:left;font-size:11px;letter-spacing:0.5px;text-transform:uppercase;
    color:var(--ink-soft);padding:12px 14px;border-bottom:1px solid var(--line);background:var(--ivory-deep);
  }
  .admin-table td{padding:11px 14px;border-bottom:1px solid var(--line);font-size:13.5px;vertical-align:middle;}
  .admin-table tr:last-child td{border-bottom:none;}
  .thumb{width:42px;height:42px;object-fit:cover;border-radius:var(--radius);background:var(--ivory-deep);}
  .row-actions{display:flex;gap:8px;}
  .row-actions button{font-size:12px;padding:6px 10px;border-radius:var(--radius);border:1px solid var(--line);background:var(--white);color:var(--ink-soft);}
  .row-actions button:hover{border-color:var(--green);color:var(--green-deep);}
  .cat-list{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:18px;}
  .cat-pill{
    display:flex;align-items:center;gap:8px;background:var(--white);border:1px solid var(--line);
    padding:7px 8px 7px 14px;border-radius:20px;font-size:13px;
  }
  .cat-pill button{background:none;border:none;color:var(--ink-soft);font-size:14px;padding:0 4px;}
  .cat-pill button:hover{color:#C4483A;}
  .add-inline{display:flex;gap:8px;}
  .add-inline input{flex:1;padding:10px 13px;border:1px solid var(--line);border-radius:var(--radius);font-family:inherit;font-size:14px;}
  .settings-form{background:var(--white);border:1px solid var(--line);border-radius:var(--radius);padding:22px;max-width:480px;}
  .save-note{font-size:12px;color:var(--green-deep);margin-left:10px;}
  .loading{display:flex;align-items:center;justify-content:center;min-height:60vh;color:var(--ink-soft);font-size:14px;}
  .empty-admin{text-align:center;padding:50px 20px;color:var(--ink-soft);font-size:13.5px;}
  .top-add{margin-bottom:0;}

  @media(max-width:640px){
    .site-header{padding:18px 16px 14px;}
    .controls{padding:0 16px;}
    .chip-row{padding:0 16px 4px;}
    .grid-wrap{padding:0 16px;}
    .grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:14px;}
    .admin-shell{padding:20px 14px 60px;}
    .admin-table{display:block;overflow-x:auto;}
  }
</style>
</head>

  function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,8); }

  function getSeed(){

  let configReady = false, productsReady = false, migrated = false;

  function finishInitialLoadIfReady(){
    // Show the store as soon as products have arrived. Settings/categories
    // already have sane defaults, so we don't make people stare at a
    // blank loading screen just because the config doc is a beat slower.
    if(productsReady) state.loading = false;
    render();

  // One-time migration: if this browser still has the old seed-data / localStorage
  // catalog and Firestore is empty, push that data up to Firestore so nothing is lost.
  async function migrateLegacyDataIfNeeded(configSnap){
    if(migrated) return;
    migrated = true;
    if(configSnap.exists) return; // Firestore already has data — nothing to migrate
    let legacy = null;
    try{ legacy = JSON.parse(localStorage.getItem('boutique-data-v1')); }catch(e){}
    if(!legacy) legacy = getSeed();
    if(!legacy) legacy = {};
    const settings = {...DEFAULT_SETTINGS, ...(legacy.settings||{})};
    const rawCats = legacy.categories || [{name:"Sarees",subs:[]},{name:"Kurtis",subs:[]},{name:"Accessories",subs:[]}];
    const categories = rawCats.map(c => typeof c === 'string' ? {name:c, subs:[]} : {name:c.name, subs:c.subs||[]});
    await storeRef.set({settings, categories});
    const legacyProducts = legacy.products || [];
    for(const p of legacyProducts){
      const {id, ...rest} = p;
      await productsRef.doc(id || uid()).set(rest);
    }
  }

  function showLoadError(msg){
    state.loading = false;
    state.loadError = msg;
    render();
  }

  function initRealtimeSync(){
    // Watchdog: if Firestore hasn't answered within 10s, stop spinning forever
    // and tell the person what to check instead.
    const watchdog = setTimeout(()=>{
      if(state.loading){
        showLoadError("Still can't reach the database after 10 seconds. In the Firebase console, make sure Firestore Database is created (Build → Firestore Database → Create database) and that its Rules tab has been Published. Then reload this page.");
      }
    }, 10000);

    storeRef.onSnapshot(async (snap)=>{
      try{
        if(!snap.exists){
          await migrateLegacyDataIfNeeded(snap);
          return; // the write above will re-trigger this listener with real data
        }
        const data = snap.data() || {};
        state.settings = {...DEFAULT_SETTINGS, ...(data.settings||{})};
        const rawCats = data.categories || [];
        state.categories = rawCats.map(c => typeof c === 'string' ? {name:c, subs:[]} : {name:c.name, subs:c.subs||[]});
        state.loadError = null;
        clearTimeout(watchdog);
        configReady = true;
        finishInitialLoadIfReady();
      }catch(e){
        console.error('Firestore setup/migration error:', e);
        clearTimeout(watchdog);
        showLoadError("Couldn't set up your store's database (permission denied). In the Firebase console, open Firestore Database → Rules, paste in open read/write rules for the 'stores' collection, and click Publish. Then reload this page.");
      }
    }, (err)=>{
      console.error('Firestore settings listener error:', err);
      clearTimeout(watchdog);
      showLoadError("Couldn't connect to the database (" + (err && err.code ? err.code : 'unknown error') + "). Check that Firestore Database is created for this Firebase project and that your internet connection is working, then reload this page.");
    });

    productsRef.orderBy('createdAt','desc').onSnapshot((snap)=>{
      state.products = snap.docs.map(d=>({id:d.id, ...d.data()}));
      productsReady = true;
      clearTimeout(watchdog);
      finishInitialLoadIfReady();
    }, (err)=>{
      console.error('Firestore products listener error:', err);
      clearTimeout(watchdog);
      showLoadError("Couldn't load products (" + (err && err.code ? err.code : 'unknown error') + "). Check your Firestore rules and internet connection, then reload this page.");
    });
  }

  // ---------- Image compression ----------
  function fileToCompressedDataURL(file, maxW=900, quality=0.72){
    return new Promise((resolve,reject)=>{
      const reader = new FileReader();
      reader.onload = ()=>{
        const img = new Image();
        img.onload = ()=>{
          let w = img.width, h = img.height;
          if(w > maxW){ h = Math.round(h * (maxW/w)); w = maxW; }
          const canvas = document.createElement('canvas');
          canvas.width = w; canvas.height = h;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img,0,0,w,h);
          resolve(canvas.toDataURL('image/jpeg', quality));
        };
        img.onerror = reject;
        img.src = reader.result;
      };
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  // ---------- Auto image hosting (ImgBB) ----------
  // Free, no-credit-card image host. Get a key at https://api.imgbb.com/ and paste it below.
  const IMGBB_API_KEY = "aa84a2fcdde174c41dcade9e51a88b21";

  async function uploadToImgbb(dataUrl){
    if(!IMGBB_API_KEY || IMGBB_API_KEY.indexOf('PASTE_YOUR') === 0){
      throw new Error('ImgBB API key not set');
    }
    const base64 = dataUrl.split(',')[1];
    const body = new URLSearchParams();
    body.append('image', base64);
    let res;
    try{
      res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {
        method: 'POST',
        body
      });
    }catch(networkErr){
      throw new Error('Network/CORS error reaching ImgBB: ' + networkErr.message);
    }
    let json;
    try{
      json = await res.json();
    }catch(parseErr){
      throw new Error('ImgBB returned a non-JSON response (HTTP ' + res.status + ')');
    }
    if(!json.success || !json.data || !json.data.url){
      const reason = (json.error && json.error.message) ? json.error.message : ('HTTP ' + res.status);
      throw new Error('ImgBB upload failed: ' + reason);
    }
    return json.data.url;
  }

    if(state.search.trim()){
      const q = state.search.trim().toLowerCase();
      list = list.filter(p => (p.name||"").toLowerCase().includes(q) || (p.description||"").toLowerCase().includes(q));
    }
    if(state.minPrice !== ""){
      list = list.filter(p => Number(p.price) >= Number(state.minPrice));
    }
    if(state.maxPrice !== ""){
      list = list.filter(p => Number(p.price) <= Number(state.maxPrice));
    }
    switch(state.sort){
      case "price-asc": list.sort((a,b)=>Number(a.price)-Number(b.price)); break;
      case "price-desc": list.sort((a,b)=>Number(b.price)-Number(a.price)); break;
      case "name-asc": list.sort((a,b)=>(a.name||"").localeCompare(b.name||"")); break;
      default: list.sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));
    }
    return list;
  }

  // ---------- Event delegation ----------
  document.addEventListener('click', async (e)=>{
    if(e.target.id==='modal-overlay'){ state.modal=null; render(); return; }
    const t = e.target.closest('[data-action]');
    if(!t) return;
    const action = t.dataset.action;

    if(action==='go-admin'){ state.view='admin'; render(); }
    if(action==='go-store'){ state.view='store'; render(); }
    if(action==='set-cat'){ state.activeCategory = t.dataset.cat; state.activeSubcategory='All'; render(); }
    if(action==='set-subcat'){ state.activeSubcategory = t.dataset.sub; render(); }
    if(action==='close-modal'){ state.modal=null; render(); }
    if(action==='open-add-product'){ state.modal={type:'product', product:null, imgData:null, imageUrl:''}; render(); }
    if(action==='edit-product'){
      const p = state.products.find(x=>x.id===t.dataset.id);
      state.modal={type:'product', product:p, imgData:p?p.image:null, imageUrl:p?(p.imageUrl||''):''};
      render();
    }
    if(action==='delete-product'){
      if(confirm('Delete this product? This cannot be undone.')){
        try{
          await deleteProductDoc(t.dataset.id);
        }catch(e){
          alert("Couldn't delete this product. Check your internet connection and try again.");
        }
      }
    }
    if(action==='delete-category'){
      const cat = t.dataset.cat;
      const inUse = state.products.some(p=>p.category===cat);
      if(inUse && !confirm(`"${cat}" is used by existing products. Delete anyway? Their category will show as Uncategorized.`)) return;
      state.categories = state.categories.filter(c=>c.name!==cat);
      await saveCategories();
      render();
    }
    if(action==='delete-subcategory'){
      const cat = t.dataset.cat, sub = t.dataset.sub;
      const inUse = state.products.some(p=>p.category===cat && p.subcategory===sub);
      if(inUse && !confirm(`"${sub}" is used by existing products. Delete anyway?`)) return;
      const c = state.categories.find(x=>x.name===cat);
      if(c) c.subs = c.subs.filter(s=>s!==sub);
      await saveCategories();
      render();
    }
    if(action==='admin-tab'){ state.adminTab = t.dataset.tab; render(); }
    if(action==='admin-logout'){ state.adminUnlocked=false; state.view='store'; render(); }
    if(action==='view-product'){
      const p = state.products.find(x=>x.id===t.dataset.id);
      if(!p) return;
      state.modal={type:'lightbox', product:p};
      render();
    }
    if(action==='enquire-whatsapp'){
      const p = state.products.find(x=>x.id===t.dataset.id);
      if(!p) return;
      const cur = state.settings.currency || "₹";
      const msg = buildEnquiryMessage(p, cur);
      window.open(waLink(state.settings.whatsapp, msg), '_blank', 'noopener');
    }
    if(action==='remove-img'){
      const modal = document.getElementById('m-img-input');
      if(modal) modal.value='';
      state.modal.imgData = null;
      state.modal.imageUrl = '';
      render();
    }
  });

  document.addEventListener('submit', async (e)=>{

      if(val.length < 4){ err.textContent='Use at least 4 characters.'; err.style.display='block'; return; }
      if(val !== val2){ err.textContent='Passcodes do not match.'; err.style.display='block'; return; }
      state.settings.passcode = val;
      await saveSettings();
      state.adminUnlocked = true;
      render();
    }

    if(form.id==='passcode-login-form'){

        render();

      }
    }

    if(form.id==='product-form'){
      const fd = new FormData(form);
      const name = fd.get('name').trim();
      const category = fd.get('category');

      if(submitBtn){ submitBtn.disabled = true; submitBtn.textContent = 'Saving…'; }
      try{
        if(existing){
          await updateProductDoc(existing.id, { name, category, subcategory, price:Number(price), description, image, imageUrl });
        }else{
          await addProductDoc(uid(), { name, category, subcategory, price:Number(price), description, image, imageUrl, createdAt:Date.now() });
        }
        state.modal=null;
        render();
      }catch(e){
        err.textContent = "Couldn't save this product. Check your internet connection and try again.";
        err.style.display='block';
        if(submitBtn){ submitBtn.disabled = false; submitBtn.textContent = originalLabel; }
      }
    }

    if(form.id==='category-form'){
      const val = form.querySelector('#new-cat').value.trim();
      if(val && !state.categories.some(c=>c.name===val)){
        state.categories.push({name:val, subs:[]});
        await saveCategories();
        form.reset();
        render();
      }
    }

    if(form.classList.contains('subcategory-form')){
      const catName = form.dataset.cat;
      const input = form.querySelector('.new-sub-input');
      const val = input.value.trim();
      const c = state.categories.find(x=>x.name===catName);
      if(val && c && !c.subs.includes(val)){
        c.subs.push(val);
        await saveCategories();
        render();
      }
    }

    if(form.id==='settings-form'){
      const fd = new FormData(form);
      state.settings.shopName = fd.get('shopName').trim() || DEFAULT_SETTINGS.shopName;
      state.settings.tagline = fd.get('tagline').trim();
      state.settings.whatsapp = fd.get('whatsapp').trim();
      state.settings.currency = fd.get('currency').trim() || "₹";
      await saveSettings();

  // ---------- Auto product naming: Sub-category + Category + serial number ----------
  function titleCase(str){
    return String(str||'').trim().toLowerCase().replace(/\b\w/g, ch=>ch.toUpperCase());
  }
  function nextSerialFor(category, subcategory, excludeId){
    const matches = state.products.filter(p=>
      p.id!==excludeId &&
      (p.category||'')===(category||'') &&
      (p.subcategory||'')===(subcategory||'')
    );
    return matches.length + 1;
  }
  function generateProductName(category, subcategory, excludeId){
    if(!category && !subcategory) return '';
    const serial = nextSerialFor(category, subcategory, excludeId);
    const serialStr = String(serial).padStart(2,'0');
    const parts = [];
    if(subcategory) parts.push(titleCase(subcategory));
    if(category) parts.push(titleCase(category));
    parts.push(serialStr);
    return parts.join(' ');
  }
  function autoFillProductName(){
    const form = document.getElementById('product-form');
    if(!form) return;
    const nameInput = form.querySelector('input[name="name"]');
    const catSelect = document.getElementById('product-category-select');
    const subSelect = document.getElementById('product-subcategory-select');
    if(!nameInput || !catSelect || !subSelect) return;
    const excludeId = state.modal && state.modal.product ? state.modal.product.id : null;
    nameInput.value = generateProductName(catSelect.value, subSelect.value, excludeId);
  }

  function buildEnquiryMessage(p, currency){
    const lines = [];
    lines.push(`Hi! I'm interested in this product:`);
    lines.push(``);
    lines.push(`*${p.name}*`);
    const catLine = [p.category, p.subcategory].filter(Boolean).join(' > ');
    if(catLine) lines.push(`Category: ${catLine}`);
    lines.push(`Price: ${currency}${p.price}`);
    if(p.description) lines.push(`Details: ${p.description}`);
    if(p.imageUrl) lines.push(``, p.imageUrl);
    lines.push(``, `Is it available?`);
    return lines.join('\n');
  }

    return `
    <form id="category-form" class="add-inline">
      <input id="new-cat" type="text" placeholder="New category name">
      <button type="submit" class="btn btn-primary">Add category</button>
    </form>`;
  }

  function settingsTabHTML(){
    const s = state.settings;
    return `
    <form id="settings-form" class="settings-form">
      <div class="field"><label>Shop name</label><input name="shopName" type="text" value="${esc(s.shopName)}"></div>
      <div class="field"><label>Tagline</label><input name="tagline" type="text" value="${esc(s.tagline)}" placeholder="A short line under your shop name"></div>
      <div class="field"><label>WhatsApp number (with country code, digits only)</label><input name="whatsapp" type="text" value="${esc(s.whatsapp)}" placeholder="e.g. 919876543210"></div>
      <div class="field"><label>Currency symbol</label><input name="currency" type="text" value="${esc(s.currency)}" style="max-width:100px;"></div>
      <div class="btn-row" style="justify-content:flex-start;align-items:center;">
        <button type="submit" class="btn btn-primary">Save settings</button>
        <span class="save-note" style="display:none;">Saved.</span>
      </div>
    </form>
    `;
  }

  function adminHTML(){
    if(!state.adminUnlocked) return passcodeGateHTML();
    const tab = state.adminTab;
    return `
    <div class="app">
      <header class="site-header">
        <div class="header-row">
          <div class="brand-block"><img class="brand-logo" src="${LOGO_DATA_URI}" alt="${esc(state.settings.shopName)}"><div class="shop-tagline">Admin</div></div>
          <div class="header-actions">
            <button class="icon-btn" data-action="go-store">View store</button>
            <button class="icon-btn" data-action="admin-logout">Log out</button>
          </div>
        </div>
      </header>
      <div class="admin-shell">
        <div style="background:var(--ivory-deep);border:1px solid var(--line);border-radius:var(--radius);padding:12px 16px;font-size:12.5px;color:var(--ink-soft);margin-bottom:20px;line-height:1.6;">
          Changes save to the cloud instantly and appear live on your site for every visitor — no re-uploading needed.
        </div>
        <div class="tabs">
          <button class="tab ${tab==='products'?'active':''}" data-action="admin-tab" data-tab="products">Products</button>
          <button class="tab ${tab==='categories'?'active':''}" data-action="admin-tab" data-tab="categories">Categories</button>
          <button class="tab ${tab==='settings'?'active':''}" data-action="admin-tab" data-tab="settings">Settings</button>
        </div>
        ${tab==='products' ? productsTabHTML() : tab==='categories' ? categoriesTabHTML() : settingsTabHTML()}
      </div>
      ${state.modal && state.modal.type==='product' ? productModalHTML() : ''}
    </div>`;
  }

  function productModalHTML(){
    const p = state.modal.product;
    const img = state.modal.imgData;
    const selectedCatObj = state.categories.find(c=>c.name === (p ? p.category : ''));
    const subsForSelectedCat = selectedCatObj ? selectedCatObj.subs : [];
    return `
    <div class="overlay" id="modal-overlay">
      <div class="modal modal-wide">
        <div class="modal-head">
          <h2>${p ? 'Edit product' : 'Add product'}</h2>
          <button class="modal-close" data-action="close-modal">×</button>
        </div>
        <div class="modal-body">
          <form id="product-form">
            <div class="field">
              <label>Product image</label>
              <label class="img-upload">
                ${img ? `<img src="${img}"><br>` : ''}
                <span class="up-label">${img ? 'Click to replace image' : 'Click to upload an image'}</span>
                <input id="m-img-input" type="file" accept="image/*">
              </label>
            </div>
            <div class="field-row">
              <div class="field">
                <label>Category</label>
                <select name="category" id="product-category-select">
                  <option value="">Uncategorized</option>
                  ${state.categories.map(c=>`<option value="${esc(c.name)}" ${p&&p.category===c.name?'selected':''}>${esc(c.name)}</option>`).join('')}
                </select>
              </div>
              <div class="field">
                <label>Sub-category</label>
                <select name="subcategory" id="product-subcategory-select" ${subsForSelectedCat.length===0?'disabled':''}>
                  <option value="">None</option>
                  ${subsForSelectedCat.map(s=>`<option value="${esc(s)}" ${p&&p.subcategory===s?'selected':''}>${esc(s)}</option>`).join('')}
                </select>
              </div>
            </div>
            <div class="field">
              <label>Product name (auto-generated)</label>
              <input name="name" type="text" readonly value="${esc(p ? p.name : generateProductName(p?p.category:'', p?p.subcategory:'', p?p.id:null))}" placeholder="Pick a category and sub-category above">
              <div style="font-size:12px;color:#8a8072;margin-top:4px;">Built automatically as: Sub-category + Category + serial number. Change the fields above to update it.</div>
            </div>
            <div class="field">
              <label>Price (${state.settings.currency})</label>
              <input name="price" type="number" min="0" step="0.01" value="${p?p.price:''}" placeholder="e.g. 2499" style="max-width:200px;">
            </div>
            <div class="field">
              <label>Description (optional)</label>
              <textarea name="description" placeholder="Fabric, fit, size notes...">${p ? esc(p.description||'') : ''}</textarea>
            </div>
            <div class="field">
              <label>Photo link (fills in automatically)</label>
              <input name="imageUrl" type="text" value="${esc(state.modal.imageUrl||'')}" placeholder="Fills in automatically once you upload a photo above">
              <div id="photo-link-status" style="font-size:12.5px;color:#8a8072;margin-top:4px;">${state.modal.imageUrl ? 'Photo link ready ✓ — WhatsApp will show a real photo preview.' : "Upload a photo above and this fills in on its own. You can also paste a link manually."}</div>
            </div>
            <div class="error-msg" style="display:none;"></div>
            <div class="btn-row">
              <button type="button" class="btn btn-ghost" data-action="close-modal">Cancel</button>
              <button type="submit" class="btn btn-primary">${p ? 'Save changes' : 'Add product'}</button>
            </div>
          </form>
        </div>
      </div>
    </div>`;
  }

  window.__closeModal = ()=>{ state.modal=null; render(); };

  function render(){
    const root = document.getElementById('root');
    if(state.loading){
      root.innerHTML = `<div class="loading">Loading your catalog…</div>`;
      return;
    }
    if(state.loadError){
      root.innerHTML = `
      <div class="loading" style="flex-direction:column;gap:14px;max-width:520px;margin:0 auto;text-align:center;padding:40px 20px;">
        <div class="display" style="font-size:19px;color:var(--ink);">Couldn't load your catalog</div>
        <div style="font-size:13.5px;line-height:1.6;">${esc(state.loadError)}</div>
        <button class="btn btn-primary" onclick="location.reload()">Reload page</button>
      </div>`;
      return;
    }
    root.innerHTML = state.view==='admin' ? adminHTML() : storeHTML();
  }

  initRealtimeSync();
})();
</script>


</body></html>
